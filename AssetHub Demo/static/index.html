<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advisor Pulse</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <h1>Advisor Pulse</h1>
        <p>Clients who need attention today, ranked by urgency.</p>
      </header>

      <section id="login-view" class="panel">
        <h2>Sign in</h2>
        <p class="muted">Demo user is pre-filled. Pulse results come from the authenticated advisor id.</p>
        <form id="login-form">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />

          <button class="primary" type="submit">Sign in</button>
        </form>
        <p id="login-error" class="error" aria-live="polite"></p>
      </section>

      <section id="dashboard-view" class="panel" hidden>
        <div class="dashboard-header">
          <div>
            <h2 id="user-name">Advisor</h2>
            <p id="advisor-meta" class="muted"></p>
          </div>
          <div class="dashboard-actions">
            <button id="refresh-button" class="secondary" type="button">Refresh</button>
            <button id="logout-button" class="secondary" type="button">Sign out</button>
          </div>
        </div>
        <div id="pulse-list" class="pulse-list"></div>
      </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
